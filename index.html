<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도메인 IP 조회기</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        input { width: 80%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; outline: none; }
        button { background: #4CAF50; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 20px; background: #1e1e1e; padding: 15px; border-radius: 10px; text-align: center; font-family: monospace; border: 1px solid #333; color: #00FF00; }
    </style>
</head>
<body>

    <h2>🔍 도메인 IP 찾기</h2>
    <p>도메인 주소를 입력하세요 (예: google.com)</p>
    
    <input type="text" id="domainInput" placeholder="도메인 입력...">
    <button onclick="resolveDNS()">IP 조회하기</button>

    <div id="result">여기에 IP 주소가 표시됩니다.</div>

    <script>
        async function resolveDNS() {
            const domain = document.getElementById('domainInput').value.trim();
            const resultDiv = document.getElementById('result');
            
            if(!domain) { alert("도메인을 입력해주세요!"); return; }
            
            // 프로토콜(http:// 등)이 포함되어 있다면 제거
            const cleanDomain = domain.replace(/^https?:\/\//, '').split('/')[0];
            
            resultDiv.innerText = "조회 중...";

            try {
                // Cloudflare의 DNS over HTTPS API를 사용하여 IP를 가져옵니다.
                const response = await fetch(`https://cloudflare-dns.com/dns-query?name=${cleanDomain}&type=A`, {
                    headers: { 'accept': 'application/dns-json' }
                });
                const data = await response.json();

                if (data.Answer && data.Answer.length > 0) {
                    // 첫 번째 결과(IP)만 추출
                    const ips = data.Answer.map(ans => ans.data).join('\n');
                    resultDiv.innerText = `[ ${cleanDomain} ]\n\n${ips}`;
                } else {
                    resultDiv.innerText = "IP 정보를 찾을 수 없습니다.\n주소를 확인해주세요.";
                }
            } catch(e) {
                resultDiv.innerText = "오류 발생: 인터넷 연결을 확인하거나\n나중에 다시 시도하세요.";
            }
        }
    </script>
</body>
</html>
